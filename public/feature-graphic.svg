<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1612;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2318;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B7933D;stop-opacity:1" />
    </linearGradient>
    <!-- Decorative circles -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B7933D;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#B7933D;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)" />

  <!-- Decorative glow circles -->
  <circle cx="150" cy="250" r="300" fill="url(#glow)" />
  <circle cx="900" cy="200" r="250" fill="url(#glow)" />

  <!-- Decorative lines -->
  <line x1="0" y1="1" x2="1024" y2="1" stroke="#B7933D" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="499" x2="1024" y2="499" stroke="#B7933D" stroke-width="2" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="4" height="180" fill="url(#gold)" rx="2"/>

  <!-- Main title -->
  <text x="112" y="230" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#FFFFFF" letter-spacing="-1">Realize</text>

  <!-- Subtitle -->
  <text x="113" y="285" font-family="Arial, sans-serif" font-size="26" fill="#B7933D" letter-spacing="6" font-weight="300">CONSULTADORIA</text>

  <!-- Divider -->
  <rect x="113" y="308" width="280" height="1" fill="#B7933D" opacity="0.5"/>

  <!-- Description -->
  <text x="113" y="338" font-family="Arial, sans-serif" font-size="18" fill="#c8b88a" letter-spacing="1">Portal de Gestão de Colaboradores</text>

  <!-- Right side - feature icons -->
  <!-- Card 1 -->
  <rect x="600" y="100" width="180" height="90" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#B7933D" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="140" font-family="Arial" font-size="28">🌴</text>
  <text x="655" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Férias</text>
  <text x="655" y="155" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">Gestão de ausências</text>
  <text x="655" y="173" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">e pedidos online</text>

  <!-- Card 2 -->
  <rect x="800" y="100" width="180" height="90" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#B7933D" stroke-width="1" stroke-opacity="0.4"/>
  <text x="820" y="140" font-family="Arial" font-size="28">📅</text>
  <text x="855" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Calendário</text>
  <text x="855" y="155" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">Visualize ausências</text>
  <text x="855" y="173" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">em tempo real</text>

  <!-- Card 3 -->
  <rect x="600" y="210" width="180" height="90" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#B7933D" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="250" font-family="Arial" font-size="28">📄</text>
  <text x="655" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Documentos</text>
  <text x="655" y="265" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">Aceda aos seus</text>
  <text x="655" y="283" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">documentos pessoais</text>

  <!-- Card 4 -->
  <rect x="800" y="210" width="180" height="90" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#B7933D" stroke-width="1" stroke-opacity="0.4"/>
  <text x="820" y="250" font-family="Arial" font-size="28">🎫</text>
  <text x="855" y="245" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Suporte</text>
  <text x="855" y="265" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">Tickets internos</text>
  <text x="855" y="283" font-family="Arial, sans-serif" font-size="12" fill="#c8b88a">sempre disponíveis</text>

  <!-- Bottom tagline -->
  <text x="512" y="430" font-family="Arial, sans-serif" font-size="14" fill="#B7933D" text-anchor="middle" letter-spacing="3" opacity="0.8">realize.dasprent.pt</text>

</svg>
